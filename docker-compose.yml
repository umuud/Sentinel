services:
  sentinel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSqlConnection=Host=postgresql;Port=5432;Database=sentinel_db;Username=sentinel_user;Password=sentinel_pass
      - Jwt__Key=SuperSecretKey12345678901234567890
      - Jwt__Issuer=Sentinel
      - Jwt__Audience=SentinelUsers
      - Jwt__AccessTokenExpirationHours=1
      - Jwt__RefreshTokenExpirationDays=7
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=sentinel_user
      - RabbitMQ__Password=sentinel_pass
      - Serilog__ElasticsearchUrl=http://elasticsearch:9200
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    container_name: sentinel-postgresql
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel_user
      POSTGRES_PASSWORD: sentinel_pass
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sentinel-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sentinel_user
      RABBITMQ_DEFAULT_PASS: sentinel_pass
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: sentinel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - sentinel-network
    restart: unless-stopped

  kibana:
    image: kibana:8.13.0
    container_name: sentinel-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

networks:
  sentinel-network:
    driver: bridge

volumes:
  postgresql-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data: